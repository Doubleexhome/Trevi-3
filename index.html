<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Vacanze Trevi</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  scroll-behavior: smooth;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  z-index: 1000;
}

.navbar a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
}

.navbar a:hover {
  color: #ff7e5f;
}

/* HERO */
.hero {
  height: 100vh;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

.hero video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  filter: brightness(0.5);
}

.hero-content {
  max-width: 700px;
}

.hero h1 {
  font-size: 50px;
  margin-bottom: 20px;
}

.hero p {
  font-size: 20px;
  margin-bottom: 30px;
}

.cta {
  padding: 12px 25px;
  background: linear-gradient(90deg, #ff7e5f, #feb47b);
  color: white;
  border: none;
  cursor: pointer;
  text-decoration: none;
}

/* SEZIONI */
.section {
  padding: 80px 20px;
  text-align: center;
}

.section h2 {
  margin-bottom: 40px;
  font-size: 32px;
}

/* GALLERY */
.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.gallery img {
  width: 300px;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}

/* LIGHTBOX */
.lightbox {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

.lightbox img {
  max-width: 90%;
}

.close {
  position: absolute;
  top: 20px;
  right: 30px;
  color: white;
  font-size: 40px;
  cursor: pointer;
}

/* FORM */
form {
  display: flex;
  flex-direction: column;
  align-items: center;
}

input, textarea {
  width: 300px;
  padding: 12px;
  margin: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  padding: 12px 20px;
  background: linear-gradient(90deg, #ff7e5f, #feb47b);
  border: none;
  color: white;
  cursor: pointer;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 60px;
}

/* FOOTER */
footer {
  background: #111;
  color: white;
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div><strong>Trevi Home</strong></div>
  <div>
    <a href="#home">Home</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contatti</a>
  </div>
</div>

<!-- HERO -->
<section id="home" class="hero">
  <video autoplay muted loop>
    <source src="sfondo.mp4" type="video/mp4">
  </video>

  <div class="hero-content">
    <h1>Vivi la magia della Fontana di Trevi</h1>
    <p>Soggiorna nel cuore di Roma con una vista unica al mondo</p>
    <a href="#contact" class="cta">Richiedi disponibilità</a>
  </div>
</section>

<!-- GALLERY -->
<section id="gallery" class="section">
  <h2>Gallery</h2>

  <div class="gallery">
    <img src="foto1.jpg" onclick="openLightbox(this.src)">
    <img src="foto2.jpg" onclick="openLightbox(this.src)">
    <img src="foto3.jpg" onclick="openLightbox(this.src)">
  </div>
</section>

<!-- CONTATTI -->
<section id="contact" class="section">
  <h2>Contattaci</h2>

  <form id="form">
    <input type="text" name="nome" placeholder="Nome" required>
    <input type="text" name="cognome" placeholder="Cognome" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="tel" name="telefono" placeholder="Telefono" required>

    <input type="date" name="arrivo">
    <input type="date" name="partenza">

    <textarea name="note" placeholder="Richieste speciali"></textarea>

    <button type="submit">Invia richiesta</button>
  </form>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span class="close" onclick="closeLightbox()">×</span>
  <img id="lightbox-img">
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/1234567890?text=Chatta%20con%20Doubleexhome" target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/WhatsApp.svg/960px-WhatsApp.svg.png">
</a>

<!-- FOOTER -->
<footer>
  <p>© 2026 Casa Vacanze Trevi - Tutti i diritti riservati</p>
  <p>info@tuosito.it</p>
</footer>

<script>
function openLightbox(src) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = src;
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}

/* FORM */
const scriptURL = "https://script.google.com/macros/s/TUO_SCRIPT_ID/exec";
const form = document.getElementById("form");

form.addEventListener("submit", e => {
  e.preventDefault();
  fetch(scriptURL, {
    method: "POST",
    body: new FormData(form)
  })
  .then(() => alert("Richiesta inviata!"))
  .catch(() => alert("Errore invio"));
});
</script>

</body>
</html>
